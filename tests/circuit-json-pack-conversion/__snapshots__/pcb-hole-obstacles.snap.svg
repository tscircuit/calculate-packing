45.65379825653795 143.05042726971828,151.68518041731966 144.52718536630852,157.65847707080414 146.97264156288242,163.51616210488226 150.36324477944464,169.2018228105395 154.6663416535274,174.6607031670821 159.84049100992135,179.84023117254893 165.83586296184663,184.69052514082938 172.59471880000243,189.16487408956849 180.05196704790094,193.22018759246197 188.13579032836842,196.81741076361715 196.76833700414645,199.92190037745348 205.86647093171734,202.50375850190318 215.34257210781283,204.53812043184053 225.105380497943,206.00539414978488 235.06087492041723,206.891449007739 245.11317852172002,207.18775181305398 255.1654821230228,206.891449007739 265.120976545497,206.00539414978488 274.8837849356272,204.53812043184053 284.3598861117227,202.50375850190318 293.4580200392936,199.92190037745348 302.09056671507165,196.81741076361715 310.17438999553906,193.22018759246197 317.6316382434376,189.1648740895685 324.3904940815934,184.6905251408294 330.38586603351865,179.84023117254893 335.56001538991256,174.66070316708212 339.8631122639954,169.20182281053954 343.2537154805577,163.51616210488228 345.6991716771315,157.65847707080417 347.17592977372175,151.68518041731966" fill="rgba(0,0,0,0.1)" stroke="#555" stroke-width="0.024376785714285715"/></g><circle data-type="circle" data-label="" data-x="5" data-y="-3" cx="532.2716284521281" cy="432.812248186946" r="67.72837154787196" fill="rgba(0,0,0,0.1)" stroke="#555" stroke-width="0.024376785714285715"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":41.022635704344005,"c":0,"e":327.15844993040804,"b":0,"d":-41.022635704344005,"f":309.744341073914};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>